name: Feature request
description: Suggest an idea for this project
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please share as much context as you can.
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I have searched existing issues and discussions
          required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Chat / conversation
        - Model management
        - Tools / plugins
        - Skills
        - Memory
        - Agents
        - MCP server
        - Remote providers
        - UI / UX
        - Performance
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
      placeholder: It's hard to...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see happen?
      placeholder: Add a new...
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or features you've considered
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, prior art, links
  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I would be willing to submit a PR for this feature
