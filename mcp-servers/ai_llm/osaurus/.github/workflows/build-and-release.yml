name: Build and Release Osaurus

on:
  push:
    tags:
      - "*.*.*"        # Match semantic versioning (e.g. 1.2.3)
      - "*.*.*-beta.*" # Match beta pre-releases (e.g. 1.3.0-beta.1)
  workflow_dispatch:
    inputs:
      upload_to_release:
        description: "Upload to GitHub Release"
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  # Single source of truth for the Xcode pin in this workflow. Keep this in
  # sync with `XCODE_VERSION` in .github/workflows/ci.yml — both files must
  # build against the same toolchain. Bump intentionally; never drift.
  XCODE_VERSION: "26.4.1"

jobs:
  verify_ci:
    # Gate: only publish a release from a commit whose CI (ci.yml) is green.
    # A tag push points at a commit that already ran CI on `main`, so this cheap
    # ubuntu job confirms the required checks passed BEFORE the ~37m macOS build
    # starts — no point burning a release runner on a red commit. Manual
    # workflow_dispatch runs skip this gate (maintainer override / off-main
    # validation builds), which is why `build` below tolerates a skipped result.
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      checks: read
    steps:
      - name: Require green CI on the tagged commit
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          # These must match the job names in .github/workflows/ci.yml.
          REQUIRED="test-core test-cli swiftlint shellcheck"
          echo "Checking CI check-runs for commit $SHA ..."
          RUNS="$(gh api --paginate "repos/$REPO/commits/$SHA/check-runs" \
            -q '.check_runs[] | "\(.name)\t\(.status)\t\(.conclusion)"')"
          printf '%s\n' "$RUNS"
          FAIL=0
          for name in $REQUIRED; do
            # Most recent check-run with this name (last line wins).
            line="$(printf '%s\n' "$RUNS" | awk -F'\t' -v n="$name" '$1==n' | tail -1)"
            if [ -z "$line" ]; then
              echo "::error title=CI gate::No CI check named '$name' found for $SHA. Refusing to release an unverified commit."
              FAIL=1
              continue
            fi
            status="$(printf '%s' "$line" | cut -f2)"
            conclusion="$(printf '%s' "$line" | cut -f3)"
            if [ "$status" != "completed" ] || [ "$conclusion" != "success" ]; then
              echo "::error title=CI gate::CI check '$name' is status=$status conclusion=$conclusion (need completed/success)."
              FAIL=1
            fi
          done
          if [ "$FAIL" -ne 0 ]; then
            echo "Release blocked: required CI checks are not all green on this commit." >&2
            exit 1
          fi
          echo "All required CI checks are green; proceeding to build."

  build:
    # Gate on CI for tag pushes; allow manual workflow_dispatch runs where
    # verify_ci is skipped. `always()` lets this job evaluate even when a needed
    # job was skipped, and the result check blocks it when the gate actually
    # failed.
    needs: verify_ci
    if: ${{ always() && (needs.verify_ci.result == 'success' || needs.verify_ci.result == 'skipped') }}
    # Pin to a specific runner image (was `macos-latest`) so a runner image
    # bump can't silently change the build environment. macos-26 is required
    # because Containerization needs the macOS 26 SDK.
    runs-on: macos-26
    # Release builds are intentionally cache-free (fresh cold compile of
    # mlx-swift Cmlx + SQLCipher), so worst-case is ~37m. Cap at 60m so a hung
    # build (e.g. a stuck notarization upload) can't run to GitHub's 6h default.
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # Fetch all history for changelog generation

      - name: Set up Xcode ${{ env.XCODE_VERSION }}
        uses: maxim-lobanov/setup-xcode@v1
        with:
          # Pinned via the workflow-level XCODE_VERSION env (kept in sync with
          # ci.yml) so the same commit always builds against the same toolchain.
          # Bump intentionally — never let `latest-stable` drift in CI.
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Install Metal Toolchain
        run: xcodebuild -downloadComponent MetalToolchain

      - name: Setup build environment
        run: bash scripts/setup_env.sh

      - name: Install certificates
        env:
          MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: bash scripts/build/install_certificates.sh

      - name: Build Osaurus (ARM64)
        env:
          DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
          DEVELOPER_ID_NAME: ${{ secrets.DEVELOPER_ID_NAME }}
          APTABASE_APP_KEY: ${{ secrets.APTABASE_APP_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: bash scripts/build/build_arm64.sh

      - name: Verify App Signing
        run: bash scripts/build/verify_signing.sh

      - name: Verify App Launch (spawn gate)
        run: bash scripts/build/verify_launch.sh

      - name: Create DMGs
        env:
          DEVELOPER_ID_NAME: ${{ secrets.DEVELOPER_ID_NAME }}
        run: bash scripts/build/create_dmgs.sh

      - name: Notarize apps
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: bash scripts/build/notarize.sh

      - name: Package dSYMs
        run: bash scripts/build/package_dsyms.sh

      # Upload symbols to Sentry so production crashes symbolicate. Best-effort:
      # the script no-ops if the Sentry secrets aren't configured. Tag-only so we
      # don't push debug files for throwaway workflow_dispatch builds.
      - name: Upload dSYMs to Sentry
        if: startsWith(github.ref, 'refs/tags/')
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: bash scripts/build/upload_dsyms_sentry.sh

      - name: Get Release Notes from Draft
        id: changelog
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/release/get_release_notes.sh

      - name: Write Release Notes
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cat > RELEASE_NOTES.md <<'CHANGELOG_EOF'
          ${{ steps.changelog.outputs.changelog }}
          CHANGELOG_EOF

      - name: Create Release in Repository
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          PUBLIC_REPO: ${{ github.repository }}
          IS_BETA: ${{ env.IS_BETA }}
        run: bash scripts/build/create_release.sh

      - name: Generate and Deploy Sparkle Appcast
        if: startsWith(github.ref, 'refs/tags/')
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          PUBLIC_REPO: ${{ github.repository }}
          SPARKLE_CHANNEL: ${{ env.SPARKLE_CHANNEL }}
        run: bash scripts/release/generate_and_deploy_appcast.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: osaurus-release-${{ env.VERSION }}
          path: |
            build_output/Osaurus-${{ env.VERSION }}.dmg
            build_output/Osaurus.dmg
            build_output/Osaurus-${{ env.VERSION }}-dSYMs.zip
            updates/appcast.xml
          if-no-files-found: warn

      - name: Post to Discord
        if: startsWith(github.ref, 'refs/tags/') && env.IS_BETA != 'true'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: bash scripts/release/discord_notify.sh

  mark_released:
    needs: build
    if: startsWith(github.ref, 'refs/tags/') && !contains(github.ref, '-beta.')
    runs-on: ubuntu-latest

    permissions:
      contents: read # allow checkout
      pull-requests: write # allow label changes

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Switch "pending release" → "released"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # list all merged PRs that still carry "pending release"
          for PR in $(gh pr list \
                --state merged \
                --label "pending release" \
                --json number \
                --jq '.[].number'); do
            echo "🏷  Updating PR #$PR"
            gh pr edit "$PR" \
              --add-label "released" \
              --remove-label "pending release"
          done
