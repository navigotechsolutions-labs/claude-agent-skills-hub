name: Deploy Sparkle Appcast

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to publish (e.g. 0.19.13)"
        required: true
        type: string
      channel:
        description: "Sparkle channel"
        required: true
        default: release
        type: choice
        options:
          - release
          - beta

permissions:
  contents: read

jobs:
  deploy-appcast:
    # Sparkle's generate_appcast/sign_update binaries are macOS Mach-O; they
    # cannot run on ubuntu-latest (Exec format error / exit 126).
    runs-on: macos-26
    timeout-minutes: 10
    env:
      VERSION: ${{ inputs.version }}
      SPARKLE_CHANNEL: ${{ inputs.channel }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Generate and Deploy Sparkle Appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          PUBLIC_REPO: ${{ github.repository }}
        run: bash scripts/release/generate_and_deploy_appcast.sh

      - name: Download release assets for artifact upload
        run: |
          mkdir -p build_output
          curl -L -f -o "build_output/Osaurus-${VERSION}.dmg" \
            "https://github.com/${{ github.repository }}/releases/download/${VERSION}/Osaurus-${VERSION}.dmg"
          curl -L -f -o build_output/Osaurus.dmg \
            "https://github.com/${{ github.repository }}/releases/download/${VERSION}/Osaurus.dmg"
          curl -L -f -o "build_output/Osaurus-${VERSION}-dSYMs.zip" \
            "https://github.com/${{ github.repository }}/releases/download/${VERSION}/Osaurus-${VERSION}-dSYMs.zip" \
            || echo "::warning::dSYM zip not found on release; skipping."

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: osaurus-release-${{ env.VERSION }}
          path: |
            build_output/Osaurus-${{ env.VERSION }}.dmg
            build_output/Osaurus.dmg
            build_output/Osaurus-${{ env.VERSION }}-dSYMs.zip
            updates/appcast.xml
          if-no-files-found: warn

      - name: Post to Discord
        if: inputs.channel == 'release'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: bash scripts/release/discord_notify.sh
