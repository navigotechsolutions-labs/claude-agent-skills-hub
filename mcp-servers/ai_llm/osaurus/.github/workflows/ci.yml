name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      clear_cache:
        # Re-runs of a failed job already force a cold build automatically
        # (see "Wipe restored caches" step). This input is for the rare case
        # where you want to start a brand-new run with a cold build — e.g.
        # after a CACHE_SALT bump on `main` to verify the cold path before
        # PR runs hit it.
        description: "Force a cold build on the FIRST attempt (re-runs are already cold)"
        type: boolean
        default: false

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Bump to invalidate every cache entry without source surgery (e.g., after a
  # known-bad cache or an Xcode toolchain upgrade we want to flush manually).
  CACHE_SALT: v2-vmlx-5b84387
  # Pin Xcode so cache keys are stable across runner image bumps. When you
  # need to upgrade, change here AND in setup-xcode below.
  XCODE_VERSION: "26.4.1"

jobs:
  test-core:
    # Pinned (was `macos-latest`) so a runner image bump can't quietly
    # change the build environment under us.
    runs-on: macos-26
    # 45 min, not 30. Three-bucket budget:
    #   ~25–30 min — full cold build (mlx-swift `Cmlx` C++ + SQLCipher
    #                 `sqlite3.c` ~250k LoC of C compiled with
    #                 `-DSQLITE_HAS_CODEC=1` and friends + OsaurusCore +
    #                 OsaurusCoreTests Swift) when both SPM and DerivedData
    #                 caches miss. PR #951 (run 24937664669, attempt 2)
    #                 hit the prior 30-min wall mid-Swift-compile after
    #                 27:27 in the xcodebuild step — that's the empirical
    #                 floor on `macos-26` with the SQLCipher amalgamation.
    #   ~ 2– 3 min — actual `xcodebuild test` once the build is warm.
    #   ~10–15 min — buffer / future growth, runner variance.
    #
    # Once any successful run lands on `main`, the `Save DerivedData cache`
    # step at the bottom populates the cache and subsequent runs return to
    # ~5 min total. The 45-min ceiling is an "even a worst-case cold build
    # finishes" guard, NOT an expected duration. If you find yourself
    # raising it again, the right fix is to split this into a separate
    # build-cache-warm job that runs nightly on `main`, not to bump the
    # ceiling indefinitely.
    timeout-minutes: 45
    env:
      WORKSPACE: osaurus.xcworkspace
      SPM_CACHE: .spm-cache
      XCRESULT_PATH: build/Tests.xcresult
      # Mirror of xcbeautify stdout/stderr. The `Print failure summary`
      # step greps this for the last `Test Case ... started` line on the
      # dying PID when Mode E (single-process SIGSEGV) fires — see the
      # comment block above the Mode E branch in that step.
      XCBEAUTIFY_LOG: build/test-core.log
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Check localizations
        run: bash scripts/i18n/check.sh

      - name: Set up Xcode ${{ env.XCODE_VERSION }}
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Install xcbeautify
        run: brew install xcbeautify

      - name: Cache SPM packages
        uses: actions/cache@v5
        with:
          path: ${{ env.SPM_CACHE }}
          key: spm-${{ runner.os }}-${{ env.CACHE_SALT }}-xcode${{ env.XCODE_VERSION }}-${{ hashFiles('osaurus.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-${{ env.CACHE_SALT }}-xcode${{ env.XCODE_VERSION }}-
            spm-${{ runner.os }}-${{ env.CACHE_SALT }}-

      - name: Restore DerivedData cache
        id: dd-cache
        # Restore only on main pushes / manual maintainer runs, and only when
        # the exact source/package hash matches. Pull requests intentionally
        # cold-build DerivedData.
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/cache/restore@v5
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          # Include vendored C sources (currently the SQLCipher amalgamation
          # under Packages/OsaurusCore/SQLCipher/). Without this, an
          # SQLCipher bump would land its new sqlite3.{c,h} but CI would
          # silently re-use a stale cached compile of the old code.
          key: dd-${{ runner.os }}-${{ env.CACHE_SALT }}-xcode${{ env.XCODE_VERSION }}-${{ hashFiles('osaurus.xcworkspace/xcshareddata/swiftpm/Package.resolved', 'Packages/**/*.swift', 'Packages/**/Package.swift', 'Packages/**/Resources/**', 'Packages/**/*.c', 'Packages/**/*.h') }}
          # Do not use broad restore keys for DerivedData. A restored cache
          # from an older package graph can contain Swift modules whose C
          # module dependencies are no longer visible to Xcode, which shows
          # up as "unable to resolve module dependency" for transitive C
          # targets such as CAsyncHTTPClient / CNIOPosix when EventSource
          # builds. If the exact source/package hash changed, cold-build and
          # save a fresh cache under the new primary key instead.

      # Make "clear the build cache" a one-click operation. Three triggers:
      #   1. Pull requests — always cold-build DerivedData so PRs never trust
      #      a cached Xcode build product from another ref.
      #   2. `github.run_attempt != '1'` — i.e. a re-run. The default
      #      "Re-run failed jobs" button is the natural place for someone
      #      who just saw a build failure to land, so we make that the
      #      intuitive escape hatch for cache poison: the first attempt
      #      uses the cache (fast); any re-run forces a cold compile.
      #   3. `workflow_dispatch.clear_cache=true` — manual force-cold on
      #      a fresh run (e.g. validating a CACHE_SALT bump before PRs
      #      start hitting it).
      #
      # We wipe ONLY DerivedData, not the SPM cache. DerivedData holds
      # compiled object files / .swiftmodule / linked binaries — the
      # actual build outputs that can carry over a stale-source bug across
      # incremental builds. The SPM cache is just downloaded source code
      # pinned by `Package.resolved` checksums; it can't be "poisoned" in
      # any way that affects build correctness, and re-downloading it on
      # every re-run cost ~2 min in PR #951 run 24937664669 — wasted
      # budget that contributed to the 30-min cold-build cancellation.
      #
      # On main/manual runs we wipe AFTER the restore step (rather than
      # skipping the restore) so `steps.dd-cache.outputs.cache-primary-key`
      # stays populated and the `Save DerivedData cache` step at the bottom
      # can still repopulate the cache on a successful `main` run.
      - name: Wipe restored DerivedData (PR, re-run, or workflow_dispatch clear_cache)
        if: ${{ github.event_name == 'pull_request' || github.run_attempt != '1' || (github.event_name == 'workflow_dispatch' && inputs.clear_cache) }}
        run: |
          REASON="event=${{ github.event_name }}, run_attempt=${{ github.run_attempt }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.clear_cache }}" = "true" ]; then
            REASON="$REASON, workflow_dispatch clear_cache=true"
          fi
          echo "::notice title=Cold build forced::Wiping DerivedData before build ($REASON). SPM cache preserved (it's source-only and pinned by Package.resolved)."
          rm -rf "$HOME/Library/Developer/Xcode/DerivedData"

      - name: Resolve dependencies
        run: >-
          xcodebuild -resolvePackageDependencies
          -workspace "$WORKSPACE"
          -scheme OsaurusCoreTests
          -clonedSourcePackagesDirPath "$SPM_CACHE"
          -quiet

      - name: Test OsaurusCore
        id: test
        run: |
          set -o pipefail
          mkdir -p build
          # We deliberately pass a dummy resultBundlePath check first because
          # xcodebuild refuses to overwrite an existing bundle.
          rm -rf "$XCRESULT_PATH"
          # Per-test-case allowance surfaces a hung test BEFORE the job
          # wall-timeout — and crucially, surfaces it WITH A NAME ATTACHED
          # in the xcresult bundle, which the failure summary step below
          # relies on. Keep this above the scheduler-starvation noise floor:
          # Swift Testing can start hundreds of async suites at once, and
          # Xcode's default parallel workers have produced false 60s
          # timeouts on trivial @MainActor tests while a second xctest
          # worker was still draining unrelated shell/timer-heavy rows.
          #
          # Why no `--quiet` on xcbeautify and no `-test-iterations`:
          # both were band-aids that landed during PR #878's launch-hang
          # incident. `--quiet` strips per-test "Started/Passed" lines so a
          # hung test produces no output telling us WHICH test hung.
          # `-test-iterations 2 -retry-tests-on-failure` doubles the
          # wall-clock cost of every hang for zero diagnostic gain. Both
          # are off by default — re-add only if you have a per-PR reason
          # and an exit plan.
          # `tee` the xcbeautify output to a log file so the failure
          # summary step below can grep for the dying-PID's last
          # `Test Case ... started` line. We tee AFTER xcbeautify (not
          # before) because the raw xcodebuild output for Swift Testing
          # is bare `Test name() started.` lines with no PID attached;
          # xcbeautify enriches each result with `on 'My Mac - xctest
          # (PID)'`, which is the signal Mode E correlates against. Both
          # the GHA renderer output (consumed by GitHub) and the
          # tee'd file see the same enriched line stream. `set -o
          # pipefail` above means xcodebuild's failure exit code still
          # propagates through the longer pipeline.
          xcodebuild test \
            -workspace "$WORKSPACE" \
            -scheme OsaurusCoreTests \
            -disableAutomaticPackageResolution \
            -clonedSourcePackagesDirPath "$SPM_CACHE" \
            -resultBundlePath "$XCRESULT_PATH" \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            -enableCodeCoverage NO \
            -parallel-testing-enabled NO \
            -parallel-testing-worker-count 1 \
            -maximum-parallel-testing-workers 1 \
            -test-timeouts-enabled YES \
            -default-test-execution-time-allowance 180 \
            -maximum-test-execution-time-allowance 300 \
            COMPILER_INDEX_STORE_ENABLE=NO \
            SWIFT_COMPILATION_MODE=incremental \
            | xcbeautify --renderer github-actions --is-ci \
            | tee "$XCBEAUTIFY_LOG"

      - name: Annotate timing
        if: always()
        run: echo "::notice title=test-core duration::$SECONDS seconds"

      - name: Print failure summary
        # Also run on `cancelled()` so a job-timeout cancellation (e.g. a
        # cold build that ate the 45-min wall) still gets a Mode A diag
        # block in the GitHub UI instead of being a silent skip — see
        # PR #951 run 24937664669, where attempt 2's 27:27 cold compile
        # was killed by the prior 30-min timeout AND `Print failure
        # summary` was skipped because cancellation isn't `failure()`.
        if: ${{ failure() || cancelled() }}
        env:
          # Surface the cache outcome inside the summary so the next person
          # can immediately tell "cold-cache compile timeout" from "warm
          # cache + actual hang" without scrolling the log.
          DD_CACHE_HIT: ${{ steps.dd-cache.outputs.cache-hit }}
        run: |
          set +e
          echo "## test-core failures" >> "$GITHUB_STEP_SUMMARY"

          # Five real failure modes we want to disambiguate. Each conflation
          # has historically cost us hours of misdirected debugging, so this
          # step exists specifically to put the right diagnosis at the top
          # of the GitHub job summary instead of forcing the next person to
          # re-derive it from raw logs.
          #
          # Mode A — xctest binary doesn't exist on disk
          #          ⇒ build phase didn't finish (compile error, OR cold
          #          cache + 30-min wall-timeout fired mid-Swift-compile,
          #          OR linker failure). PR #881 (run 24573707695) hit this
          #          flavor: both SPM and DerivedData caches missed because
          #          main hadn't ever saved one, so the cold build ran out
          #          of clock during OsaurusCoreTests Swift compilation.
          #
          # Mode B — xctest binary built BUT no xcresult bundle
          #          ⇒ test bundle launched but produced zero output before
          #          the wall-timeout / cancellation. Real launch-time hang
          #          (dyld load, +load methods, or first-test module init).
          #          PR #878 (run 24563175247) hit this flavor — see the
          #          comment block atop `_registerFactoriesOnce` in
          #          ModelRuntime.swift.
          #
          # Mode C — xcresult exists with zero test cases
          #          ⇒ test execution was killed mid-flight. Look for the
          #          last `Test Case ... started` line in the raw log;
          #          that's the prime suspect for the hang. (`--quiet` is
          #          intentionally NOT passed to xcbeautify so the line is
          #          present.)
          #
          # Mode E — xcresult has failed test cases AND ≥80% of the failure
          #          messages are an identical `"Test crashed with signal
          #          ..."` line. That's the fingerprint of a single xctest
          #          process crash that took out every test scheduled after
          #          it: xctest restarts the bundle in a new PID and
          #          finishes the rest of the suite, but the tests that
          #          were queued (not yet run) on the dying PID all get
          #          tagged "crashed with signal ..." regardless of their
          #          actual code. PR #1066 (run 25738325529) hit this
          #          flavor — 106 tests across 50+ unrelated suites all
          #          reported the same crash message, with 98 of them also
          #          reported by PR #1068 (run 25742705850); the actual
          #          culprit is a single test that ran in parallel with
          #          the dying batch. Mode E surfaces the dying-PID's last
          #          `Test Case ... started` line from the raw log so the
          #          next person doesn't have to download the xcresult
          #          bundle to start bisecting. Pair with the
          #          `~/Library/Logs/DiagnosticReports/*.ips` artifact
          #          uploaded below for a symbolicated stack.
          #
          # Mode D — xcresult exists with failed test cases (and Mode E
          #          ruled out). Ordinary test failures; render the
          #          failures table.

          # Resolve the xctest binary path. Xcode hashes the DerivedData
          # subdirectory off the workspace path, so glob rather than
          # hardcode. We only care about existence, not the actual binary.
          XCTEST_BINARY="$(find "$HOME/Library/Developer/Xcode/DerivedData" \
            -maxdepth 6 -name 'OsaurusCoreTests.xctest' -type d 2>/dev/null \
            | head -1)"

          if [ ! -d "$XCRESULT_PATH" ]; then
            if [ -z "$XCTEST_BINARY" ]; then
              # Mode A.
              CACHE_NOTE="_(DerivedData cache hit: \`${DD_CACHE_HIT:-unknown}\`, run attempt: \`${{ github.run_attempt }}\`)_"
              {
                echo "**Mode A — build phase did not complete (no xctest bundle on disk).**"
                echo
                echo "Either a compile/link error fired (scroll the **Test OsaurusCore** log above for the first \`error:\` line), OR the cold build ran past the 45-min job timeout. ${CACHE_NOTE}"
                echo
                echo "If \`cache-hit: false\` AND no \`error:\` lines appear in the raw log, this is the cold-cache-timeout flavor. The fix is to land one successful run on \`main\` so the \`Save DerivedData cache\` step at the bottom of this job populates the cache; subsequent PR runs warm-start from it and finish in ~5 min. Re-running this same job will hit the cache the second time only IF the first attempt finishes successfully."
                echo
                echo "**\`run_attempt > 1\` AND \`cache-hit: false\`?** That's the deliberate cold-rebuild path triggered by **Re-run failed jobs** — see the \`Wipe restored DerivedData\` step in this job. If the cold build is exhausting the 45-min budget on every re-run, the codebase has outgrown the budget; bump \`timeout-minutes\` and update its comment block, OR move warm-cache priming to a nightly \`main\` job so PRs always warm-start."
                echo
                echo "**Suspect cache poisoning on a fresh attempt?** Pull requests already cold-build DerivedData; main/manual re-runs wipe DerivedData automatically while preserving the pinned SPM source cache."
              } >> "$GITHUB_STEP_SUMMARY"
            else
              # Mode B.
              {
                echo "**Mode B — xctest bundle built but launched silently (real launch-time hang).**"
                echo
                echo "The \`OsaurusCoreTests.xctest\` binary exists in DerivedData (\`$XCTEST_BINARY\`), so the build phase finished. The hang is in dyld load, an ObjC \`+load\` method, a Swift module initializer, or the first test's module init."
                echo
                echo "Prime suspects: any file-level \`let\` in OsaurusCore that touches MLX/Metal at first reference (this is the regression class that PR #878 surfaced — see \`_registerFactoriesOnce\` in \`Packages/OsaurusCore/Services/ModelRuntime.swift\` and the matching tests in \`Packages/OsaurusCore/Tests/Service/ModelRuntimeFindDirectoryTests.swift\`)."
              } >> "$GITHUB_STEP_SUMMARY"
            fi
            exit 0
          fi

          # `xcresulttool get test-results tests` is the modern (Xcode 16+)
          # JSON view of the test outcomes. Older flag is now deprecated.
          XCRESULT_JSON="$(xcrun xcresulttool get test-results tests \
            --path "$XCRESULT_PATH" \
            --format json 2>/dev/null)"

          # Count test cases regardless of outcome so we can detect the
          # "started, killed mid-flight" case where there are no Failure
          # nodes but also no Passed nodes.
          TEST_CASE_COUNT="$(printf '%s' "$XCRESULT_JSON" \
            | jq '[ .. | objects | select(.nodeType? == "Test Case" or .nodeType? == "Test") ] | length' \
            2>/dev/null || echo 0)"

          if [ "${TEST_CASE_COUNT:-0}" = "0" ]; then
            echo "**Mode C — xcresult bundle exists but contains zero test cases.**" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Test execution was killed before any test recorded a result — most likely a hung test that ate the job wall-timeout, or a runner crash. Check the raw log for the last \`Test Case ... started\` line; that's the prime suspect for the hang." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # Mode E vs Mode D classifier. Pull every Failure Message attached
          # to a failed test case and compute the share that look like a
          # single-process signal crash. We treat ≥80% of the same
          # `"Test crashed with signal ..."` message as the Mode E
          # fingerprint. The 80% threshold (vs. 100%) tolerates the
          # occasional real-failure tag that lands in the same xcresult
          # alongside a process crash — those should still trigger the
          # Mode E bisection workflow, not the Mode D table that buries
          # the crash story under 100+ identical rows.
          FAILURE_MSGS_JSON="$(printf '%s' "$XCRESULT_JSON" | jq -c '
              [ .. | objects
                | select(.result? == "Failed"
                         and (.nodeType? == "Test Case" or .nodeType? == "Test"))
                | { name: (.name // "(unknown)"),
                    msg: ( [ .. | objects | select(.nodeType? == "Failure Message") | .name ] | join("|") ) }
              ]
            ' 2>/dev/null || echo '[]')"
          FAILED_COUNT="$(printf '%s' "$FAILURE_MSGS_JSON" | jq 'length' 2>/dev/null || echo 0)"
          # Just the most common failure message and its count.
          read -r CRASH_SHARE CRASH_MSG <<<"$(printf '%s' "$FAILURE_MSGS_JSON" \
            | jq -r '
                if length == 0 then "0 _"
                else
                  group_by(.msg)
                  | map({msg: .[0].msg, n: length})
                  | sort_by(-.n)[0]
                  | "\(.n) \(.msg)"
                end
              ' 2>/dev/null || echo '0 _')"
          IS_SIGNAL_CRASH=0
          case "$CRASH_MSG" in
            *"Test crashed with signal"*) IS_SIGNAL_CRASH=1 ;;
          esac
          # Bash arithmetic, not jq, so we don't fail on edge cases.
          if [ "${FAILED_COUNT:-0}" -gt 0 ] \
             && [ "$IS_SIGNAL_CRASH" = "1" ] \
             && [ "$(( CRASH_SHARE * 100 / FAILED_COUNT ))" -ge 80 ]; then
            # Mode E. Find the dying PID and its last `Test Case ... started`
            # line from the tee'd raw log. xcbeautify's pretty output strips
            # `Test Case` lines, but the file we tee BEFORE xcbeautify keeps
            # the raw xcodebuild output that includes them. The dying PID is
            # the one that appears in the log up to a point and then is
            # never seen again — easiest heuristic: the SECOND-to-last
            # unique `xctest (NNNN)` PID, because xctest restarts the
            # bundle and the LAST PID is the new (post-crash) one.
            DYING_PID=""
            LAST_RESULT_ON_DYING=""
            CRASH_BATCH_ON_DYING=""
            PID_TIMELINE=""
            if [ -f "$XCBEAUTIFY_LOG" ]; then
              # xcbeautify's output decorates every test-result line with
              # `on 'My Mac - xctest (PID)'`. Pull the unique PIDs in
              # encounter order. With Swift Testing's parallel runner the
              # raw xcodebuild output has no per-test PID — xcbeautify is
              # the source of truth for this signal.
              PIDS_ORDERED="$(grep -oE "xctest \([0-9]+\)" "$XCBEAUTIFY_LOG" \
                | awk -F'[()]' '!seen[$2]++ { print $2 }')"
              PID_COUNT="$(printf '%s\n' "$PIDS_ORDERED" | grep -c . || echo 0)"
              PID_TIMELINE="$(printf '%s\n' "$PIDS_ORDERED" | paste -sd' → ' -)"
              # The dying PID is the SECOND-to-last unique PID in the
              # timeline because xctest restarts the bundle and the LAST
              # PID is the post-crash survivor. If only one PID is
              # observed (no restart), assume it died at the end.
              if [ "$PID_COUNT" -ge 2 ]; then
                DYING_PID="$(printf '%s\n' "$PIDS_ORDERED" | sed -n "$((PID_COUNT - 1))p")"
              else
                DYING_PID="$(printf '%s\n' "$PIDS_ORDERED" | head -1)"
              fi
              if [ -n "$DYING_PID" ]; then
                # Last test-result line attributed to the dying PID. With
                # parallel testing this is the LAST test that completed
                # before the crash — the offender is one of the tests
                # running concurrently with this one. The next batch of
                # `##[error]` lines pinned to the same PID is the herd
                # of tests that got tagged crashed when the bundle died.
                LAST_RESULT_ON_DYING="$(grep -F "xctest ($DYING_PID)" "$XCBEAUTIFY_LOG" \
                  | grep -vE "^##\[error\]" \
                  | tail -1 || true)"
                # Show the first three crashed-tag lines on the dying PID
                # so a reader can immediately see the size of the herd
                # without downloading the xcresult bundle.
                CRASH_BATCH_ON_DYING="$(grep -E "^##\[error\]" "$XCBEAUTIFY_LOG" \
                  | grep -F "xctest ($DYING_PID)" \
                  | head -3 || true)"
              fi
            fi
            {
              echo "**Mode E — single-process crash (\`$CRASH_MSG\`) — ${CRASH_SHARE} of ${FAILED_COUNT} \"failures\" share this message.**"
              echo
              echo "These tests didn't actually fail in their own code — they were scheduled on the xctest process that died and got tagged \"crashed\" en masse when the bundle restarted. The actual culprit is the test that was running in parallel with the crash, which xctest cannot identify on its own."
              echo
              if [ -n "$PID_TIMELINE" ]; then
                echo "**xctest PID timeline:** \`${PID_TIMELINE}\`"
                echo
              fi
              if [ -n "$DYING_PID" ]; then
                echo "**Dying PID:** \`${DYING_PID}\`"
                echo
                if [ -n "$LAST_RESULT_ON_DYING" ]; then
                  echo "**Last completed test on the dying PID** (the offender ran in parallel with this one — start your bisect with the suite this test belongs to):"
                  echo
                  echo '```'
                  printf '%s\n' "$LAST_RESULT_ON_DYING"
                  echo '```'
                  echo
                fi
                if [ -n "$CRASH_BATCH_ON_DYING" ]; then
                  echo "**First few crashed-tag rows on the dying PID** (these are the tests xctest had queued for this PID at the time of the crash; the actual culprit is a sibling running in parallel, NOT one of these):"
                  echo
                  echo '```'
                  printf '%s\n' "$CRASH_BATCH_ON_DYING"
                  echo '```'
                  echo
                fi
              else
                echo "_(could not derive a dying PID from the raw log; see the \`Test OsaurusCore\` step output for the last test result line on the dying \`xctest (PID)\` instance)_"
                echo
              fi
              echo "**Next step:** download the \`test-core-diagnostic-reports-${{ github.run_attempt }}\` artifact from this run for the symbolicated \`xctest-*.ips\` crash report; the offending frame is on top of the thread that took the signal. To bisect locally, run the suspect suite with \`-parallel-testing-enabled NO\` and a few neighbouring suites under parallelism. Also see the \`test-core-xcbeautify-log-${{ github.run_attempt }}\` artifact for the unfiltered xctest output."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "**Mode D — failed test cases:**" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          printf '%s' "$XCRESULT_JSON" | jq -r '
              [ .. | objects | select(.result? == "Failed" and (.nodeType? == "Test Case" or .nodeType? == "Test")) ]
              | if length == 0 then
                  "_No individual failed tests reported despite a non-zero exit. Likely a build error, post-test cleanup failure, or runner crash — see the raw log above._"
                else
                  ( "| Test | Failure |\n| --- | --- |" )
                  + ( map(
                      "| `" + (.name // "(unknown)") + "` | "
                      + ( ( [ .. | objects | select(.nodeType? == "Failure Message") | .name ] | join("<br>") )
                          // "_(no message)_" )
                      + " |"
                    ) | join("\n") )
                end
            ' >> "$GITHUB_STEP_SUMMARY" || true

      - name: Upload xcresult on failure
        # Same `failure() || cancelled()` rationale as the failure-summary
        # step above: on a wall-timeout the xcresult bundle may be
        # partially populated and is still useful for postmortem.
        if: ${{ failure() || cancelled() }}
        uses: actions/upload-artifact@v5
        with:
          name: test-core-xcresult-${{ github.run_attempt }}
          path: ${{ env.XCRESULT_PATH }}
          retention-days: 7
          if-no-files-found: warn

      - name: Upload xctest crash reports on failure
        # macOS writes a per-process `.ips` JSON crash report into
        # `~/Library/Logs/DiagnosticReports/` whenever a process takes a
        # signal (SIGSEGV, SIGBUS, SIGILL, etc.). The xcresult bundle
        # itself does NOT include these — the bundled failure message
        # is just `"Test crashed with signal segv."` with no frame info.
        # Uploading the raw `.ips` files alongside the xcresult turns
        # Mode E into a one-step bisect: download the artifact, open the
        # `xctest-<timestamp>-<pid>.ips`, find the crashing thread's top
        # frame. Without this, we'd have to ask the runner to keep its
        # filesystem (it doesn't) or reproduce locally on macOS to get
        # a stack — both ate hours during the PR #1066 / PR #1068
        # fallout.
        #
        # `if-no-files-found: ignore` because:
        #   - Compile-time failures (Mode A) leave nothing here.
        #   - A non-signal failure (Mode D) likewise leaves nothing here
        #     and shouldn't surface a warning.
        #   - The artifact uploader interprets `error` as "fail the job"
        #     and `warn` as "noisy log entry"; neither is what we want
        #     for the empty-directory case.
        if: ${{ failure() || cancelled() }}
        uses: actions/upload-artifact@v5
        with:
          name: test-core-diagnostic-reports-${{ github.run_attempt }}
          path: ~/Library/Logs/DiagnosticReports/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload xcbeautify raw log on failure
        # The Mode E branch above relies on `XCBEAUTIFY_LOG` to recover
        # the dying PID and its last `Test Case ... started` line. Keep
        # the same file as a downloadable artifact so anyone debugging a
        # crash from the GitHub UI can scroll the unfiltered xctest
        # output without re-running the job. Costs ~1-2 MB on a normal
        # run.
        if: ${{ failure() || cancelled() }}
        uses: actions/upload-artifact@v5
        with:
          name: test-core-xcbeautify-log-${{ github.run_attempt }}
          path: ${{ env.XCBEAUTIFY_LOG }}
          retention-days: 7
          if-no-files-found: ignore

      # Save the cache only on `main` so a half-baked PR can never poison it.
      # `actions/cache/save@v5` is a no-op when the key already exists, so a
      # forced cold re-run on `main` (which wipes DerivedData and rebuilds
      # from scratch) won't overwrite a known-good cache entry under the
      # same key. To intentionally invalidate every cache, bump CACHE_SALT.
      - name: Save DerivedData cache
        if: ${{ github.ref == 'refs/heads/main' && success() && steps.dd-cache.outputs.cache-primary-key != '' }}
        uses: actions/cache/save@v5
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ steps.dd-cache.outputs.cache-primary-key }}

  test-cli:
    # Pinned (was `macos-latest`).
    runs-on: macos-26
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # OsaurusCLI's Package.swift requires `swift-tools-version: 6.2`, which
      # ships with the pinned Xcode. The runner's default `swift` may be older
      # (currently 6.1), so point xcrun at the pinned Xcode for these steps.
      # GitHub Actions doesn't let job-level `env:` reference workflow-level
      # `env:`, so keep XCODE_VERSION in sync here if it ever changes.
      - name: Verify Swift toolchain
        env:
          DEVELOPER_DIR: /Applications/Xcode_${{ env.XCODE_VERSION }}.app/Contents/Developer
        run: swift --version

      - name: Run CLI tests
        env:
          DEVELOPER_DIR: /Applications/Xcode_${{ env.XCODE_VERSION }}.app/Contents/Developer
        run: swift test --package-path Packages/OsaurusCLI --parallel

      - name: Annotate timing
        if: always()
        run: echo "::notice title=test-cli duration::$SECONDS seconds"

  test-evals:
    # Harness unit tests for Packages/OsaurusEvals (fixture decode, scorer
    # contracts, regression-lab plumbing, judge resolution). Deterministic
    # and token-free — no LLM calls, no model loads — so it's safe on a
    # hosted runner. This exists because the eval suites evolve faster than
    # the kit and these tests previously had no lane at all (stale
    # suite-count assertions sat red for weeks unnoticed).
    #
    # Pinned (was `macos-latest`) for the same reason as test-core.
    runs-on: macos-26
    # Cold build compiles the whole OsaurusCore graph (mlx-swift Cmlx C++ +
    # SQLCipher amalgamation) under SwiftPM — same ~25-30 min floor as
    # test-core's cold xcodebuild. The .build cache below returns warm runs
    # to single-digit minutes.
    timeout-minutes: 45
    env:
      SPM_BUILD: Packages/OsaurusEvals/.build
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Xcode ${{ env.XCODE_VERSION }}
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Cache SwiftPM build
        uses: actions/cache@v5
        with:
          path: ${{ env.SPM_BUILD }}
          key: evals-build-${{ runner.os }}-${{ env.CACHE_SALT }}-xcode${{ env.XCODE_VERSION }}-${{ hashFiles('Packages/OsaurusEvals/Package.resolved', 'Packages/**/Package.swift', 'Packages/**/*.swift', 'Packages/**/*.c', 'Packages/**/*.h') }}
          restore-keys: |
            evals-build-${{ runner.os }}-${{ env.CACHE_SALT }}-xcode${{ env.XCODE_VERSION }}-
            evals-build-${{ runner.os }}-${{ env.CACHE_SALT }}-

      - name: Run evals harness tests
        env:
          DEVELOPER_DIR: /Applications/Xcode_${{ env.XCODE_VERSION }}.app/Contents/Developer
          # Keychain wrappers no-op so hosted runners never hit the
          # "wants to use your confidential information" prompt.
          OSAURUS_DISABLE_KEYCHAIN_FOR_TESTS: "1"
          OSAURUS_TEST_ROOT: /tmp/osaurus-evals-test
        run: swift test --package-path Packages/OsaurusEvals

      - name: Annotate timing
        if: always()
        run: echo "::notice title=test-evals duration::$SECONDS seconds"

  swiftlint:
    # Pinned (was `macos-latest`).
    runs-on: macos-26
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --reporter github-actions-logging

  shellcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Lint shell scripts
        run: |
          shellcheck --version
          find scripts -name '*.sh' -print0 | xargs -0 shellcheck --severity=warning
