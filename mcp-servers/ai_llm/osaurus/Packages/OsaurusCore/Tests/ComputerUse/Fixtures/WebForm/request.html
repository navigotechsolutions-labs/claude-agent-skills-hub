<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; form-action 'self'; base-uri 'none'">
  <title>Access Request</title>
  <style>
    body {
      color: #202124;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.4;
      margin: 32px;
      max-width: 760px;
    }

    label {
      display: block;
      font-weight: 600;
      margin-top: 18px;
    }

    input[type="email"],
    input[type="text"],
    textarea {
      border: 1px solid #9aa0a6;
      border-radius: 4px;
      box-sizing: border-box;
      display: block;
      font: inherit;
      margin-top: 6px;
      padding: 8px;
      width: 100%;
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    .terms {
      align-items: center;
      display: flex;
      gap: 8px;
      margin-top: 20px;
    }

    .terms label {
      font-weight: 500;
      margin: 0;
    }

    button {
      background: #1a73e8;
      border: 0;
      border-radius: 4px;
      color: white;
      font: inherit;
      font-weight: 600;
      margin-top: 22px;
      padding: 9px 14px;
    }

    output {
      display: block;
      margin-top: 22px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Access Request</h1>
    <p>Use this local fixture to prove a deterministic form-fill flow.</p>

    <form action="./submitted.html" autocomplete="off" method="post">
      <label for="team">Team name</label>
      <input id="team" name="team" required type="text">

      <label for="email">Email</label>
      <input id="email" name="email" required type="email">

      <label for="justification">Justification</label>
      <textarea id="justification" name="justification" required></textarea>

      <div class="terms">
        <input id="terms" name="terms" required type="checkbox">
        <label for="terms">Agree to terms</label>
      </div>

      <button type="submit">Submit request</button>
      <output aria-live="polite">Draft</output>
    </form>
  </main>
</body>
</html>
