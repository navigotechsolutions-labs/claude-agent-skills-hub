# Warden Configuration
# https://github.com/getsentry/warden
#
# Warden reviews code using AI-powered skills triggered by GitHub events.
# Skills live in .agents/skills/ or .claude/skills/, or are pulled from GitHub
# via the remote field.
#
# Add skills with: warden add <skill-name>

version = 1

# Default settings inherited by all skills
[defaults]
# Severity levels: critical, high, medium, low, info
# failOn: minimum severity that fails the check
failOn = "high"
# reportOn: minimum severity that creates PR annotations
reportOn = "medium"
# Avoid noisy no-op PR reporting.
reportOnSuccess = false

# warden-sweep is a full-repo sweep. PR-trigger is intentionally omitted so
# it does not run on every PR. It runs:
#   - On schedule via .github/workflows/warden-sweep.yml (workflow_dispatch + cron)
#   - Locally via `warden --skill warden-sweep`
[[skills]]
name = "warden-sweep"
paths = ["src/**/*.ts", "scripts/**/*.{js,mjs,sh,ts}"]
ignorePaths = [
  "**/*.test.ts",
  "**/__tests__/**",
  "**/__fixtures__/**",
  "**/__snapshots__/**",
]

[[skills.triggers]]
type = "schedule"

[skills.triggers.schedule]
issueTitle = "Warden weekly sweep"
createFixPR = true
fixBranchPrefix = "warden-sweep"

