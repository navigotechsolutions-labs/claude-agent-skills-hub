id: xcode-ide
title: Xcode IDE Integration
description: Bridge tools for connecting to Xcode's built-in MCP server (mcpbridge) to access IDE-specific functionality.
targetPlatforms: [iOS, macOS, tvOS, watchOS, visionOS]
availability:
  cli: true
predicates:
  - hideWhenXcodeAgentMode
tools:
  - xcode_ide_list_tools
  - xcode_ide_call_tool
  - xcode_tools_bridge_status
  - xcode_tools_bridge_sync
  - xcode_tools_bridge_disconnect
